<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Join the waitlist — Pricer</title>
  <meta name="description" content="Be first to know when Pricer launches. Snap a photo of any item and get an instant second-hand value. One email when we go live.">
  <link rel="icon" type="image/png" href="/assets/icon.png">

  <meta property="og:title" content="Join the Pricer waitlist">
  <meta property="og:description" content="Be first to know when Pricer launches — snap a photo, know what anything is worth.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://getpricerapp.com/waitlist">
  <meta property="og:image" content="https://getpricerapp.com/assets/og-card.png">

  <link rel="stylesheet" href="/styles.css">
  <style>
    /* ── Signup / waitlist page (on-domain Mailchimp form) ────────────────── */
    .wl-main { min-height: calc(100vh - 68px); display: flex; align-items: center; justify-content: center; padding: clamp(48px, 8vw, 96px) 0; }
    .wl { width: 100%; max-width: 540px; text-align: center; }
    .wl-pitch { margin: 18px auto 30px; font-size: var(--fs-lead); line-height: 1.6; color: var(--muted-on-dark); max-width: 30em; }
    .wl-card {
      text-align: left;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.12);
      backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
      border-radius: 18px; padding: clamp(24px, 4vw, 34px);
      box-shadow: 0 8px 30px rgba(0,0,0,0.25);
    }
    .wl-label { display: block; font-size: 13px; font-weight: 700; letter-spacing: 0.02em; color: #fff; margin-bottom: 8px; }
    .wl-input {
      width: 100%; box-sizing: border-box;
      padding: 15px 16px; font-size: 16px; font-family: inherit;
      color: #fff; background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.18); border-radius: 14px;
    }
    .wl-input::placeholder { color: rgba(255,255,255,0.40); }
    .wl-input:focus { outline: none; border-color: var(--blue); box-shadow: var(--ring); }
    .wl-consent { display: flex; align-items: flex-start; gap: 11px; margin: 18px 0 22px; font-size: 14px; line-height: 1.5; color: var(--muted-on-dark); }
    .wl-consent input { margin-top: 3px; width: 17px; height: 17px; flex: none; accent-color: var(--blue); }
    .wl-consent a { color: var(--gold); }
    .wl-submit { width: 100%; justify-content: center; }
    .wl-status { margin: 16px 2px 0; font-size: 14.5px; line-height: 1.5; min-height: 1em; }
    .wl-status.err { color: #FF9B9B; }
    .wl-status.ok  { color: var(--green); }
    /* Honeypot — keep off-screen, never shown to humans */
    .wl-hp { position: absolute; left: -5000px; }
    .wl-done { text-align: center; }
    .wl-done h2 { color: #fff; font-size: var(--fs-h2); font-weight: 900; margin: 0 0 10px; }
    .wl-done p { color: var(--muted-on-dark); font-size: var(--fs-lead); margin: 0; }
    .wl-back { display: inline-block; margin-top: 28px; font-size: 14px; color: var(--muted-on-dark); }
    .wl-back:hover { color: #fff; }
  </style>
</head>
<body>

  <a href="#main" class="skip-link">Skip to content</a>

  <!-- ── Sticky nav ───────────────────────────────────────────────────────── -->
  <header class="nav" id="top">
    <div class="container nav-inner">
      <a href="/" class="brand">
        <img src="/assets/logo-mark.png" alt="Pricer">
        <span class="brand-name">Pricer</span>
      </a>
      <nav class="nav-links">
        <a href="/#how">How it works</a>
        <a href="/#features">Features</a>
        <a href="/#contact">Contact</a>
      </nav>
    </div>
  </header>

  <main id="main" class="wl-main">
    <div class="container">
      <div class="wl">
        <span class="section-kicker">Pre-launch</span>
        <h1 class="section-title">Join the waitlist</h1>
        <p class="wl-pitch">Be first to know when Pricer launches. We'll send you a single email the day we go live — nothing else.</p>

        <div class="wl-card" id="wl-card">
          <form id="wl-form" novalidate>
            <label class="wl-label" for="wl-email">Email address</label>
            <input class="wl-input" type="email" id="wl-email" name="EMAIL" placeholder="you@example.com" autocomplete="email" required>

            <label class="wl-consent">
              <input type="checkbox" id="wl-consent" required>
              <span>Yes, email me once when Pricer launches. I can unsubscribe anytime. See our <a href="/privacy.html">privacy policy</a>.</span>
            </label>

            <!-- Mailchimp anti-bot honeypot — must stay empty -->
            <div class="wl-hp" aria-hidden="true"><input type="text" name="b_323901f917c53002201752ff1_4bcedba502" tabindex="-1" value=""></div>

            <button type="submit" class="btn btn-primary btn-lg wl-submit" id="wl-submit">Join the waitlist</button>
            <p class="wl-status" id="wl-status" role="status" aria-live="polite"></p>
          </form>
        </div>

        <a href="/" class="wl-back">← Back to home</a>
      </div>
    </div>
  </main>

  <script>
    // ── On-domain Mailchimp waitlist submit (JSONP — keeps the visitor on getpricerapp.com)
    (function () {
      var BASE = 'https://tobiassendevelopment.us4.list-manage.com/subscribe/post-json';
      var PARAMS = 'u=323901f917c53002201752ff1&id=4bcedba502&f_id=009e2ee6f0';

      var form    = document.getElementById('wl-form');
      var email   = document.getElementById('wl-email');
      var consent = document.getElementById('wl-consent');
      var btn     = document.getElementById('wl-submit');
      var status  = document.getElementById('wl-status');
      var card    = document.getElementById('wl-card');

      function setStatus(msg, cls) {
        status.textContent = msg || '';
        status.className = 'wl-status' + (cls ? ' ' + cls : '');
      }

      function showSuccess() {
        card.innerHTML =
          '<div class="wl-done">' +
            '<h2>Almost there — check your inbox ✉️</h2>' +
            '<p>We just sent you a confirmation email. Tap the link inside to lock in your spot on the waitlist.</p>' +
          '</div>';
      }

      function jsonp(url, cb) {
        var name = 'mcb_' + (window.__mcb = (window.__mcb || 0) + 1);
        window[name] = function (data) {
          try { cb(data); } finally { delete window[name]; if (s.parentNode) s.parentNode.removeChild(s); }
        };
        var s = document.createElement('script');
        s.src = url + (url.indexOf('?') === -1 ? '?' : '&') + 'c=' + name;
        s.onerror = function () { cb({ result: 'error', msg: 'network' }); if (s.parentNode) s.parentNode.removeChild(s); delete window[name]; };
        document.body.appendChild(s);
      }

      form.addEventListener('submit', function (e) {
        e.preventDefault();
        setStatus('', '');

        if (!email.value || !email.checkValidity()) {
          setStatus('Please enter a valid email address.', 'err');
          email.focus();
          return;
        }
        if (!consent.checked) {
          setStatus('Please tick the box so we can email you at launch.', 'err');
          return;
        }

        btn.disabled = true;
        var original = btn.textContent;
        btn.textContent = 'Joining…';

        var hp = form.querySelector('.wl-hp input');
        var url = BASE + '?' + PARAMS +
          '&EMAIL=' + encodeURIComponent(email.value) +
          '&' + encodeURIComponent(hp.name) + '=';

        jsonp(url, function (data) {
          if (data && data.result === 'success') {
            showSuccess();
            return;
          }
          btn.disabled = false;
          btn.textContent = original;
          var msg = (data && data.msg) ? String(data.msg).replace(/<[^>]*>/g, '') : '';
          if (/already subscribed/i.test(msg)) {
            setStatus('You’re already on the list — we’ll be in touch at launch.', 'ok');
          } else if (msg) {
            setStatus(msg, 'err');
          } else {
            setStatus('Something went wrong. Please try again in a moment.', 'err');
          }
        });
      });
    })();
  </script>

</body>
</html>
